# [!AI INSTRUCTION] 禁止在任何 map/mouse_map 指令后面写行内注释。
# kitty 不支持行内注释，# 及其后的内容会被当作参数传入命令，导致意外行为。
# 注释必须单独写在 map 指令的上方或下方。
#
# ================================================================
# 主题
# ================================================================
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME


# ================================================================
# 外观
# ================================================================

# ----- 字体 -----
font_size 14
font_family         Maple Mono NF CN
bold_font           Maple Mono NF CN Bold
italic_font         Maple Mono NF CN Italic
bold_italic_font    Maple Mono NF CN Bold Italic
font_features       MapleMono-NF-CN +cv01 +ss02 +ss04 +ss05 +zero
font_features       MapleMono-NF-CN-Bold +cv01 +ss02 +ss04 +ss05 +zero
font_features       MapleMono-NF-CN-Italic +cv01 +ss02 +ss04 +ss05 +zero
font_features       MapleMono-NF-CN-BoldItalic +cv01 +ss02 +ss04 +ss05 +zero

# ----- 窗口 -----
hide_window_decorations         titlebar-only
window_padding_width            15
background_opacity              0.8
background_blur                 30
remember_window_size            yes

# 窗口边框（突出当前 focus 的窗格）
window_border_width 2pt
inactive_text_alpha 0.5


# ================================================================
# 行为
# ================================================================

# ----- 通知 -----
# kitty, shut up!
bell-mode off
enable_audio_bell no
visual_bell_duration 0
window_alert_on_bell no

# 运行超过5秒的命令完成后发送通知(not works in tmux/zellij)
# 统一使用 BARK 通知
# notify_on_cmd_finish always 5.0

# ----- 编辑器 -----
editor vim

# ----- 布局 -----
# 文档: https://sw.kovidgoyal.net/kitty/layouts/
#
# 7 种布局说明:
#   Stack      - 当前窗口全屏，其他隐藏（配合 toggle_layout stack 实现临时全屏）
#   Tall       - 左侧大窗口占满高度，右侧窗口垂直堆叠
#   Fat        - 顶部大窗口占满宽度，底部窗口水平排列（Tall 的横版）
#   Grid       - 网格等分
#   Splits     - 自由分割，类似 tmux/vim 的任意分屏
#   Horizontal - 所有窗口左右并排
#   Vertical   - 所有窗口上下堆叠
enabled_layouts Splits, Stack, Horizontal

# ----- Tab 栏 -----
tab_bar_edge                top
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_max_length        0

# 关闭当前标签页后切换到哪个选项卡
# previous: 上次使用的 tab | left: 左边 | right: 右边 | last: 最右
tab_switch_strategy last

# {title} 来自 OSC 2 转义序列，shell integration 会自动更新为当前目录/命令
# ssh 时加 ◆ 前缀以区分远程连接，本地直接显示 title
tab_title_template "{index}) {'◆ ' + title if tab.active_exe == 'ssh' else title}"

# ----- 鼠标 -----
# cmd + 左键单击打开链接
mouse_map cmd+left release grabbed,ungrabbed mouse_click_url

# ----- 粘贴 -----
# 关闭粘贴 URL 时自动加引号
paste_actions no-op


# ================================================================
# 快捷键
# ================================================================
# [!AI INSTRUCTION] 每次新增、修改、删除任何快捷键绑定（包括 map 和
# mouse_map），必须同步更新文件末尾的 KEYMAP REFERENCE 索引。
# 无论改动来自用户要求还是 AI 自主决定，索引都必须保持准确。

# ----- Tab 管理 -----
# cmd+t 从当前目录新建 tab（而非 home 目录）
# 理由：几乎不在 home 目录做操作，cd 一步就能回去，从当前目录新建更实用
map cmd+t           new_tab_with_cwd

map cmd+shift+w     close_tab
# 重命名当前 tab（手动命名后 OSC 2 自动更新不再生效，直到 tab 关闭重开）
map cmd+r           set_tab_title

# 为每个 tab 绑定快捷键 cmd+1/2/3...
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# ----- 窗口 / 分屏 -----
map cmd+d           launch --location=vsplit --cwd=current
map cmd+shift+d     launch --location=hsplit --cwd=current
map cmd+w           close_window_with_confirmation
map cmd+z           toggle_layout stack     # 当前窗格临时全屏 (类似 tmux prefix+z)

# vim 风格切换窗口焦点
map cmd+h neighboring_window left
map cmd+j neighboring_window bottom
map cmd+k neighboring_window top
map cmd+l neighboring_window right

# vim 风格调整窗格大小
map cmd+shift+h resize_window narrower
map cmd+shift+l resize_window wider
map cmd+shift+k resize_window taller
map cmd+shift+j resize_window shorter

# ----- Overlay 工具 -----
# 弹出 lazygit（overlay 覆盖当前窗口，退出后恢复）
map cmd+g launch --type=overlay --cwd=current --color=background=black --env XDG_CONFIG_HOME=/Users/tony/.config lazygit

# 弹出临时 shell，exit 后自动关闭
map cmd+f launch --type=overlay --cwd=current --color=background=black

# ----- 文本 hints -----
# 文档: https://sw.kovidgoyal.net/kitty/conf/#select-and-act-on-visible-text
map cmd+;  kitten hints --alphabet asdfghjkl --type word --program -
map cmd+'  kitten hints --alphabet asdfghjkl --type line --program -

# ----- 禁用的默认键 -----
map cmd+enter   # 取消默认的 cmd+enter 分屏（用 cmd+d 代替）


# ================================================================
# KEYMAP REFERENCE
# ================================================================
# [!AI INSTRUCTION] 这是快捷键索引，必须与上方 map 指令保持同步。
# 新增或修改快捷键时，先改 map 指令，再更新此处索引，缺一不可。
#
# Tab 管理
#   cmd+t             新建 tab（从当前目录）
#   cmd+shift+w       关闭当前 tab（无确认）
#   cmd+r             重命名当前 tab
#   cmd+1~9           跳转到第 n 个 tab
#
# 窗口 / 分屏
#   cmd+d             左右分屏（vsplit）
#   cmd+shift+d       上下分屏（hsplit）
#   cmd+w             关闭当前窗口（有确认）
#   cmd+z             当前窗格临时全屏（toggle stack layout）
#   cmd+h/j/k/l       切换窗口焦点（vim 风格）
#   cmd+shift+h/j/k/l 调整窗格大小
#
# Overlay 工具
#   cmd+g             lazygit overlay
#   cmd+f             临时 shell overlay（exit 后关闭）
#
# 文本 hints
#   cmd+;             选中并插入词
#   cmd+'             选中并插入行
#
# 鼠标
#   cmd+左键单击       打开链接
#
# 禁用的默认键
#   cmd+enter         （已禁用，原为分屏）
#
# ---- 系统内置默认键备忘 ----
#
# 配置
#   ctrl+cmd+,            重新加载 kitty.conf
#
# Tab 管理
#   ctrl+shift+,          向左移动当前 tab
#   ctrl+shift+.          向右移动当前 tab
